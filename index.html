<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RECON</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RECON">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --text: #e8e8e8;
      --muted: #666666;
      --accent: #00ff88;
      --error: #ff3b3b;
      --border: #1e1e1e;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    [data-theme="light"] {
      --bg: #f4f2ef;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #888888;
      --accent: #00994d;
      --error: #cc2b2b;
      --border: #e0ded9;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      min-height: 100dvh;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: calc(var(--safe-top) + 12px) 20px 12px;
      padding-left: calc(var(--safe-left) + 20px);
      padding-right: calc(var(--safe-right) + 20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--text);
      user-select: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .streak {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }

    .streak-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      line-height: 1;
    }

    .streak-number {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      font-weight: 600;
      line-height: 1;
      transition: color 0.3s ease;
    }

    .streak-number.tier-0 { color: var(--muted); opacity: 0.5; }
    .streak-number.tier-1 { color: var(--text); }
    .streak-number.tier-2 { color: var(--accent); }
    .streak-number.tier-3 {
      color: var(--accent);
      text-shadow: 0 0 8px var(--accent), 0 0 16px rgba(0, 255, 136, 0.3);
    }

    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s;
    }

    .theme-toggle:hover {
      color: var(--text);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* Main */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px calc(var(--safe-bottom) + 24px);
      padding-left: calc(var(--safe-left) + 20px);
      padding-right: calc(var(--safe-right) + 20px);
    }

    .container {
      width: 100%;
      max-width: 540px;
    }

    /* Question */
    .question-text {
      font-size: 19px;
      font-weight: 400;
      line-height: 1.55;
      margin-bottom: 24px;
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, transform 0.1s, opacity 0.3s;
      text-align: left;
      outline: none;
      font-family: inherit;
      color: var(--text);
    }

    .option-btn:hover:not(:disabled) {
      background: color-mix(in srgb, var(--card) 85%, var(--text) 15%);
      border-color: color-mix(in srgb, var(--border) 60%, var(--text) 40%);
    }

    .option-btn:active:not(:disabled) {
      transform: scale(0.985);
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-btn.dimmed {
      opacity: 0.35;
    }

    .option-badge {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .option-text {
      font-size: 16px;
      line-height: 1.4;
    }

    /* Correct state */
    .option-btn.correct {
      background: color-mix(in srgb, var(--card) 80%, var(--accent) 20%);
      border-color: var(--accent);
    }

    .option-btn.correct .option-badge {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0a0a;
    }

    /* Wrong state */
    .option-btn.wrong {
      background: color-mix(in srgb, var(--card) 85%, var(--error) 15%);
      border-color: var(--error);
    }

    .option-btn.wrong .option-badge {
      background: var(--error);
      border-color: var(--error);
      color: #ffffff;
    }

    /* Feedback */
    .feedback {
      margin-top: 20px;
      opacity: 0;
      animation: fadeIn 300ms ease forwards;
    }

    .feedback-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .feedback-label.correct { color: var(--accent); }
    .feedback-label.incorrect { color: var(--error); }

    .feedback-text {
      font-size: 15px;
      line-height: 1.55;
      color: var(--text);
      opacity: 0.85;
    }

    .domain-tag {
      display: inline-block;
      margin-top: 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 100px;
    }

    /* Next Button */
    .next-btn {
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--accent);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s;
      opacity: 0;
      animation: fadeIn 300ms ease 100ms forwards;
    }

    .next-btn:hover {
      background: color-mix(in srgb, var(--card) 85%, var(--text) 15%);
      border-color: color-mix(in srgb, var(--border) 60%, var(--text) 40%);
    }

    .next-btn:active {
      transform: scale(0.985);
    }

    /* Animations */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes glowPulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
      50% { box-shadow: 0 0 16px 4px rgba(0, 255, 136, 0.2); }
      100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
    }

    [data-theme="light"] .option-btn.correct {
      animation: glowPulseLight 500ms ease;
    }

    @keyframes glowPulseLight {
      0% { box-shadow: 0 0 0 0 rgba(0, 153, 77, 0.4); }
      50% { box-shadow: 0 0 16px 4px rgba(0, 153, 77, 0.15); }
      100% { box-shadow: 0 0 0 0 rgba(0, 153, 77, 0); }
    }

    :root .option-btn.correct {
      animation: glowPulse 500ms ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-6px); }
      30% { transform: translateX(5px); }
      45% { transform: translateX(-4px); }
      60% { transform: translateX(3px); }
      75% { transform: translateX(-2px); }
    }

    .option-btn.shake {
      animation: shake 400ms ease;
    }

    @keyframes streakPulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    @keyframes streakDip {
      0% { transform: scale(1); }
      40% { transform: scale(0.8); }
      100% { transform: scale(1); }
    }

    .streak-number.pulse {
      animation: streakPulse 400ms ease;
    }

    .streak-number.dip {
      animation: streakDip 400ms ease;
    }

    .question-enter {
      animation: fadeSlideIn 350ms ease forwards;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">RECON</div>
    <div class="header-right">
      <div class="streak">
        <span class="streak-label">streak</span>
        <span id="streak-number" class="streak-number tier-0">0</span>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <div class="container" id="quiz-container"></div>
  </main>

  <script>
    (() => {
      // Theme
      const html = document.documentElement;
      const themeToggle = document.getElementById('theme-toggle');
      const iconSun = document.getElementById('icon-sun');
      const iconMoon = document.getElementById('icon-moon');
      const themeMeta = document.querySelector('meta[name="theme-color"]');

      function setTheme(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('recon-theme', theme);
        iconSun.style.display = theme === 'dark' ? 'block' : 'none';
        iconMoon.style.display = theme === 'light' ? 'block' : 'none';
        themeMeta.setAttribute('content', theme === 'dark' ? '#0a0a0a' : '#f4f2ef');
      }

      const saved = localStorage.getItem('recon-theme') || 'dark';
      setTheme(saved);

      themeToggle.addEventListener('click', () => {
        setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });

      // Quiz state
      let questions = [];
      let queue = [];
      let current = null;
      let streak = 0;
      let wrongCount = 0;
      let answered = false;
      const container = document.getElementById('quiz-container');
      const streakEl = document.getElementById('streak-number');
      const letters = ['A', 'B', 'C', 'D'];

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function updateStreak(val, anim) {
        streak = val;
        streakEl.textContent = streak;
        streakEl.className = 'streak-number';
        if (streak === 0) streakEl.classList.add('tier-0');
        else if (streak <= 2) streakEl.classList.add('tier-1');
        else if (streak <= 6) streakEl.classList.add('tier-2');
        else streakEl.classList.add('tier-3');
        if (anim) {
          streakEl.classList.add(anim);
          setTimeout(() => streakEl.classList.remove(anim), 450);
        }
      }

      function showQuestion() {
        if (queue.length === 0) queue = shuffle(questions);
        current = queue.pop();
        wrongCount = 0;
        answered = false;

        container.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'question-enter';

        const qText = document.createElement('p');
        qText.className = 'question-text';
        qText.textContent = current.question;
        wrap.appendChild(qText);

        const opts = document.createElement('div');
        opts.className = 'options';

        current.options.forEach((text, i) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.innerHTML = `<span class="option-badge">${letters[i]}</span><span class="option-text">${text}</span>`;
          btn.addEventListener('click', () => handleAnswer(i, btn, opts));
          opts.appendChild(btn);
        });

        wrap.appendChild(opts);
        container.appendChild(wrap);
      }

      function handleAnswer(idx, btn, optsEl) {
        if (btn.disabled || answered) return;
        const isCorrect = idx === current.correct;
        const allBtns = optsEl.querySelectorAll('.option-btn');

        if (isCorrect) {
          answered = true;
          btn.classList.add('correct');
          allBtns.forEach((b, i) => {
            b.disabled = true;
            if (i !== idx) b.classList.add('dimmed');
          });
          updateStreak(streak + 1, 'pulse');
          showFeedback(true, current.explanations.correct, current.domain);
        } else {
          btn.classList.add('wrong', 'shake');
          btn.disabled = true;
          wrongCount++;
          updateStreak(0, 'dip');

          if (wrongCount >= 3) {
            answered = true;
            allBtns.forEach((b, i) => {
              b.disabled = true;
              if (i === current.correct) b.classList.add('correct');
              else if (!b.classList.contains('wrong')) b.classList.add('dimmed');
            });
            showFeedback(true, current.explanations.correct, current.domain);
          } else {
            const wrongExplanation = current.explanations.wrong[String(idx)];
            showFeedback(false, wrongExplanation, null);
          }
        }
      }

      function showFeedback(isCorrect, text, domain) {
        const existing = container.querySelector('.feedback');
        if (existing) existing.remove();
        const existingNext = container.querySelector('.next-btn');
        if (existingNext) existingNext.remove();

        const fb = document.createElement('div');
        fb.className = 'feedback';

        const label = document.createElement('div');
        label.className = 'feedback-label ' + (isCorrect ? 'correct' : 'incorrect');
        label.textContent = isCorrect ? 'CORRECT' : 'INCORRECT';
        fb.appendChild(label);

        const desc = document.createElement('p');
        desc.className = 'feedback-text';
        desc.textContent = text;
        fb.appendChild(desc);

        if (domain) {
          const tag = document.createElement('span');
          tag.className = 'domain-tag';
          tag.textContent = domain;
          fb.appendChild(tag);
        }

        container.appendChild(fb);

        if (isCorrect || answered) {
          const next = document.createElement('button');
          next.className = 'next-btn';
          next.textContent = 'NEXT \u2192';
          next.addEventListener('click', showQuestion);
          container.appendChild(next);
        }
      }

      // Load questions
      fetch('questions.json')
        .then(r => r.json())
        .then(data => {
          questions = data;
          queue = shuffle(questions);
          showQuestion();
        });

      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    })();
  </script>
</body>
</html>
